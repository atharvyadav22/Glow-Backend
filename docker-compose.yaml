version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: glow-postgres
    restart: always
    environment:
      POSTGRES_DB: skincare_db
      POSTGRES_USER: skincare_user
      POSTGRES_PASSWORD: skincare_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

