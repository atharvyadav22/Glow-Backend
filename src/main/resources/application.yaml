server:
  address: 0.0.0.0
  port: ${PORT:8080}

spring:
  application:
    name: Glow

  mvc.throw-exception-if-no-handler-found: true
  web.resources.add-mappings: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET}
